<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girish Saana - AI Portfolio</title>
    <meta name="description" content="Chat with Girish Saana's AI digital twin. Software Developer skilled in React, Django, and AI integration. Explore projects, skills, and experience interactively.">
    <meta property="og:title" content="Girish Saana - AI Portfolio">
    <meta property="og:description" content="Chat with my AI digital twin to learn about my skills, projects, and experience.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://girish-saana.vercel.app">
    <meta property="og:image" content="https://i.ibb.co/Ndynk5Cq/download-1-removebg-preview.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Girish Saana - AI Portfolio">
    <meta name="twitter:description" content="Chat with my AI digital twin to learn about my skills, projects, and experience.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body>
    <canvas id="background-canvas"></canvas>

    <div id="main-content" class="main-container">
        <!-- Intro header (landing view) -->
        <header id="intro-header" class="mb-8 text-center intro-transition">
            <div class="avatar-ring mx-auto mb-4 fade-in-up">
                <img src="https://i.ibb.co/Ndynk5Cq/download-1-removebg-preview.png" alt="Girish Saana" class="w-40 h-40 md:w-48 md:h-48 rounded-full">
            </div>
            <h2 class="text-xl md:text-2xl mb-2 fade-in-up delay-1">Hey, I'm Girish Saana</h2>
            <h1 class="text-3xl md:text-4xl font-black mt-2 fade-in-up delay-2">Chat with my Digital Twin</h1>
        </header>

        <!-- Chat header (chat view) -->
        <header id="chat-header" class="hidden w-full max-w-3xl p-3 justify-center items-center">
            <div class="avatar-ring-sm">
                <img src="https://i.ibb.co/Ndynk5Cq/download-1-removebg-preview.png" alt="Girish Saana" id="home-avatar-button" class="w-10 h-10 rounded-full cursor-pointer">
            </div>
        </header>

        <main id="ai-view" class="w-full max-w-2xl fade-in-up delay-3">
            <!-- Chat Messages Container -->
            <div id="chat-messages" class="chat-messages hidden"></div>

            <!-- Stop Generating Button -->
            <div class="flex justify-center">
                <button id="stop-generation" class="hidden glassmorphism text-sm font-semibold py-2 px-4 rounded-full mb-2 hover-effect transition">
                    Stop Generating
                </button>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="flex items-center glassmorphism rounded-full shadow-md p-2 mb-3">
                    <input type="text" id="question" placeholder="Ask me anything..." class="flex-grow bg-transparent border-none focus:ring-0 focus:outline-none text-lg px-4 placeholder-gray-600 dark:placeholder-gray-400">
                    <button id="askButton" class="text-white rounded-full w-12 h-12 flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-violet-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                    </button>
                </div>

                <!-- Quick Action Chips -->
                <div id="quick-actions" class="flex flex-wrap justify-center gap-2">
                    <button class="quick-action glassmorphism shadow-sm rounded-full px-4 py-2 hover-effect transition">Me</button>
                    <button class="quick-action glassmorphism shadow-sm rounded-full px-4 py-2 hover-effect transition">Experience</button>
                    <button class="quick-action glassmorphism shadow-sm rounded-full px-4 py-2 hover-effect transition">Projects</button>
                    <button class="quick-action glassmorphism shadow-sm rounded-full px-4 py-2 hover-effect transition">Skills</button>
                    <button class="quick-action glassmorphism shadow-sm rounded-full px-4 py-2 hover-effect transition">Fun Facts</button>
                    <button class="quick-action glassmorphism shadow-sm rounded-full px-4 py-2 hover-effect transition">Contact</button>
                </div>
            </div>

            <!-- Download CV Button -->
            <div id="cv-button" class="mt-5 flex justify-center">
                <a href="https://drive.google.com/file/d/1IVkCmzjuTRcmomVZMPApYMI0d4jZB3fg/view?usp=sharing" download="GirishSaanaResume.pdf"
                   class="glassmorphism shadow-lg rounded-full px-6 py-3 hover-effect transition inline-flex items-center font-semibold">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download CV
                </a>
            </div>
        </main>

        <!-- Social Links -->
        <div id="social-links" class="mt-8 flex justify-center space-x-6">
            <a href="https://linkedin.com/in/girish-saana-443018306/" target="_blank" class="social-link hover:text-blue-600 dark:hover:text-white transition transform hover:scale-125">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd"/></svg>
            </a>
            <a href="https://github.com/girish2513" target="_blank" class="social-link hover:text-gray-900 dark:hover:text-white transition transform hover:scale-125">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.168 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.031-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.378.203 2.398.1 2.65.64.7 1.03 1.595 1.03 2.688 0 3.848-2.338 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.001 10.001 0 0022 12c0-5.523-4.477-10-10-10z" clip-rule="evenodd"/></svg>
            </a>
            <a href="mailto:girishsaana2513@gmail.com" class="social-link hover:text-red-600 dark:hover:text-white transition transform hover:scale-125">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6zm-2 0l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"/></svg>
            </a>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="project-modal" class="modal-backdrop">
        <div class="modal-content">
            <div class="p-8">
                <button id="close-modal" class="absolute top-4 right-4 p-2 rounded-full hover-effect transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
